<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Romantic Teddy Bear 🧸</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background"></div>
    
    <div class="container">
        <!-- Floating Teddy Bear -->
        <div class="teddy-wrapper">
            <svg class="teddy-bear" viewBox="0 0 200 250" xmlns="http://www.w3.org/2000/svg">
                <!-- Head -->
                <circle cx="100" cy="80" r="45" fill="#8B6F47"/>
                
                <!-- Left Ear -->
                <circle cx="70" cy="35" r="20" fill="#8B6F47"/>
                <circle cx="70" cy="38" r="12" fill="#D4A574"/>
                
                <!-- Right Ear -->
                <circle cx="130" cy="35" r="20" fill="#8B6F47"/>
                <circle cx="130" cy="38" r="12" fill="#D4A574"/>
                
                <!-- Left Eye -->
                <circle cx="85" cy="70" r="6" fill="#000"/>
                <circle cx="86" cy="68" r="2" fill="#fff"/>
                
                <!-- Right Eye -->
                <circle cx="115" cy="70" r="6" fill="#000"/>
                <circle cx="116" cy="68" r="2" fill="#fff"/>
                
                <!-- Nose -->
                <circle cx="100" cy="85" r="5" fill="#000"/>
                
                <!-- Mouth -->
                <path d="M 100 85 Q 95 92 90 90" stroke="#000" stroke-width="2" fill="none" stroke-linecap="round"/>
                <path d="M 100 85 Q 105 92 110 90" stroke="#000" stroke-width="2" fill="none" stroke-linecap="round"/>
                
                <!-- Body -->
                <ellipse cx="100" cy="150" rx="35" ry="50" fill="#8B6F47"/>
                
                <!-- Left Arm -->
                <ellipse cx="65" cy="135" rx="15" ry="35" fill="#8B6F47" transform="rotate(-30 65 135)"/>
                <circle cx="58" cy="165" r="12" fill="#D4A574"/>
                
                <!-- Right Arm -->
                <ellipse cx="135" cy="135" rx="15" ry="35" fill="#8B6F47" transform="rotate(30 135 135)"/>
                <circle cx="142" cy="165" r="12" fill="#D4A574"/>
                
                <!-- Left Foot -->
                <ellipse cx="80" cy="200" rx="18" ry="25" fill="#8B6F47"/>
                <circle cx="80" cy="222" r="10" fill="#D4A574"/>
                
                <!-- Right Foot -->
                <ellipse cx="120" cy="200" rx="18" ry="25" fill="#8B6F47"/>
                <circle cx="120" cy="222" r="10" fill="#D4A574"/>
                
                <!-- Heart on chest -->
                <path d="M 100 125 L 108 118 Q 115 115 118 125 Q 115 135 100 145 Q 85 135 82 125 Q 85 115 92 118 Z" fill="#FF69B4"/>
            </svg>
        </div>
        
        <!-- Text -->
        <h1 class="main-text">WASH KATBGHINI ?</h1>
        
        <!-- Message that appears -->
        <div class="message">waxh mtéakda waxh mtéahda ghadi nskhaf</div>
        
        <!-- Buttons Container -->
        <div class="buttons-container">
            <!-- AH Button -->
            <button class="btn btn-ah" id="ahBtn">
                AH
            </button>
            
            <!-- LA Button -->
            <button class="btn btn-la" id="laBtn">
                LA
            </button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
